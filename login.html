<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Lost & Found Portal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">🔍 Lost &amp; Found</div>
    <ul class="nav-links">
      <li><a href="home.html" class="nav-link">Home</a></li>
      <li><a href="report.html" class="nav-link">Report Item</a></li>
      <li><a href="browse.html" class="nav-link">Browse Items</a></li>
      <li><a href="track.html" class="nav-link">Track Request</a></li>
      <li><a href="how-it-works.html" class="nav-link">How It Works</a></li>
    </ul>
    <button class="btn-login" onclick="window.location.href='login.html'">Login / Register</button>
  </nav>

  <!-- Login/Register Section -->
  <section class="section">
    <div class="auth-container">
      <div class="modal-tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('register')">Register</button>
      </div>
      
      <form id="loginForm" onsubmit="handleAuth(event, 'login')">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="email@example.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPass" placeholder="Password" required />
        </div>
        <button type="submit" class="btn btn-primary full-width">Login</button>
      </form>
      
      <form id="registerForm" class="hidden" onsubmit="handleAuth(event, 'register')">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="Your name" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="email@example.com" required />
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="regPhone" placeholder="1234567890" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPass" placeholder="Create password" required />
        </div>
        <button type="submit" class="btn btn-primary full-width">Register</button>
      </form>
      
      <div id="authMsg" class="success-msg hidden"></div>
    </div>
  </section>

  <footer class="footer">
    <p>© 2025 Lost &amp; Found Portal. Built with Node.js, SQL &amp; HTML/CSS/JS.</p>
  </footer>

  <script src="login.js"></script>
</body>
</html>
